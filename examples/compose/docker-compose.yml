services:
  vbart-meshcoretel-exporter:
    build:
      context: ../..
    image: ghcr.io/krom/vbart-meshcoretel-exporter:latest
    container_name: vbart-meshcoretel-exporter-demo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: vbart-meshcoretel-exporter-demo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - vbart-meshcoretel-exporter

  grafana:
    image: grafana/grafana-oss:latest
    container_name: vbart-meshcoretel-exporter-demo-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
